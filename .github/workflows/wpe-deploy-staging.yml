name: WP Engine Staging Deploy

on:
  workflow_call:
    inputs:
      theme_path:
        description: "Source path within repo root (e.g. themes/my-theme/)"
        required: true
        type: string
      remote_path:
        description: "Remote path on WP Engine (e.g. wp-content/themes/my-theme/)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to WP Engine Staging
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ vars.WPE_STAGE_ENV }}
          REMOTE_PATH: ${{ inputs.remote_path }}
          SRC_PATH: ${{ inputs.theme_path }}
          PHP_LINT: TRUE
          FLAGS: -azvr --inplace --delete --exclude=.* --exclude=node_modules
          CACHE_CLEAR: TRUE
